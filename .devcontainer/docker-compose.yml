version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/rust:2-1-trixie
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    network_mode: service:db # Shares network namespace with DB for performance/easy access
    environment:
      - NEO4J_URI=bolt://localhost:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}

  db:
    image: neo4j:5.19-community # Modern stable Neo4j
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"] # Essential for advanced graph algorithms/manipulation
    ports:
      - "7474:7474" # Web Aura GUI
      - "7687:7687" # Bolt port

volumes:
  neo4j_data:
  neo4j_logs: